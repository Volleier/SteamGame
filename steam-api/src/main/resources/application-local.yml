spring:
  datasource:
    # H2 文件数据库，部署时开箱即用
    # 数据库文件持久化到运行目录下的 ./data/steamdb.mv.db
    url: jdbc:h2:file:./data/steamdb;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: false
